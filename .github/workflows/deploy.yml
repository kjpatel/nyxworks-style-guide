name: Deploy to S3 + CloudFront

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::186544519747:role/nyxworks-github-deploy
          aws-region: us-east-1

      - name: Sync to S3
        run: aws s3 sync out/ s3://nyxworks-styleguide-site --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id E2G6X9MXKYUVM5 --paths "/*"
